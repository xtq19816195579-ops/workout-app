name: Daily Workout Report

on:
  schedule:
    - cron: '0 13 * * *'   # UTC 13:00 = 北京时间 21:00
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install pandas requests PyGithub
      - name: Run push report
        env:
          GITHUB_TOKEN: ${{ secrets.MY_REPO_TOKEN }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python push_report.py
