name: Daily Workout Report
on:
  schedule:
    - cron: '0 13 * * *'   # UTC 13:00 = 北京时间 21:00
  workflow_dispatch:       # 允许手动测试

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install pandas requests PyGithub
      - name: Run push report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # 注意：此处是系统自动生成的，用于访问仓库
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python push_report.py
